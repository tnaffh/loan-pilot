services:
  postgres:
    image: postgres:16-alpine
    container_name: loanpilot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: loanpilot
      POSTGRES_PASSWORD: loanpilot
      POSTGRES_DB: loanpilot
    # Host port 5544 (container 5432) to avoid clashing with other local Postgres instances.
    ports:
      - "5544:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loanpilot"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
